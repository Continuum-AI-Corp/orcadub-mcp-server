# OrcaDub MCP server for Codex CLI.
# Merge into ~/.codex/config.toml, then replace sk-orca-REPLACE_ME with your
# real OrcaRouter API key (https://www.orcarouter.ai/console).
#
# One-command alternative:
#   codex mcp add orcadub --env ORCADUB_API_KEY=sk-orca-... -- npx -y @orcadub/cli

[mcp_servers.orcadub]
command = "npx"
args = ["-y", "@orcadub/cli"]

[mcp_servers.orcadub.env]
ORCADUB_API_KEY = "sk-orca-REPLACE_ME"
