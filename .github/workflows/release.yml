name: release

# Push a semver tag to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# goreleaser cross-compiles linux/darwin/windows × amd64/arm64, uploads the
# bare binaries (npm launcher downloads these) + tar.gz/zip archives +
# checksums to the GitHub Release, and pushes multi-arch images to ghcr.io.
# Release artifacts get GitHub Artifact Attestations (SLSA build provenance);
# verify any downloaded file with:
#   gh attestation verify <file> -R Continuum-AI-Corp/orcadub-mcp-server
#
# npm publish runs afterwards when the NPM_TOKEN secret is configured;
# it stamps the tag version into npm/package.json before publishing.
#
# All actions are pinned to commit SHAs (comment = the tag the SHA was
# resolved from) so a moved tag cannot inject code into this pipeline.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.9.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.2.0
        with:
          subject-path: |
            dist/orcadub-mcp-server_*
            dist/checksums.txt

  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: sync root README into the package
        run: cp README.md npm/README.md
      - name: stamp version from tag
        working-directory: npm
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
      - name: publish
        working-directory: npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish"
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish the server entry to the official MCP Registry. Runs after
  # npm-publish so the registry's package-ownership check (npm mcpName ==
  # server name) sees the just-published version. Uses GitHub Actions OIDC:
  # the workflow's own identity (repository_owner = Continuum-AI-Corp) grants
  # the io.github.continuum-ai-corp/* namespace — no PAT, no org-owner login,
  # no read:org scope needed (which the interactive device flow lacks).
  registry-publish:
    needs: npm-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
      - name: login (GitHub Actions OIDC)
        run: ./mcp-publisher login github-oidc
      - name: publish to MCP Registry
        run: ./mcp-publisher publish
