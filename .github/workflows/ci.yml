name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt check
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: build
        run: go build ./...
      - name: test
        run: go test ./... -count=1
      - name: goreleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
