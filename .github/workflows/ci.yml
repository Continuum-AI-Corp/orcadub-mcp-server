name: ci

# All actions are pinned to commit SHAs (comment = the tag the SHA was
# resolved from) so a moved tag cannot inject code into this pipeline.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: gofmt check
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
      - name: build
        run: go build ./...
      - name: test
        run: go test ./... -count=1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: npm launcher syntax check
        run: node --check npm/install.js && node --check npm/bin/run.js
      - name: stdio smoke test
        run: |
          go build -o /tmp/orcadub-mcp-server ./cmd
          /tmp/orcadub-mcp-server --version
          { printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'; sleep 2; } \
            | ORCADUB_API_KEY=sk-orca-ci-smoke timeout 10 /tmp/orcadub-mcp-server | grep -q '"serverInfo"'
          echo "initialize handshake ok"
      - name: goreleaser config check
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: check
