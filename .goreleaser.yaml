# goreleaser v2 config — six-platform release of the orcadub-mcp binary.
# Tag push (v*) triggers .github/workflows/release.yml which runs this.
version: 2

project_name: orcadub-mcp

builds:
  - id: orcadub-mcp
    main: ./cmd
    binary: orcadub-mcp
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.serverVersion={{ .Version }}

archives:
  # Bare binaries — what the npm launcher's postinstall downloads
  # (no tar extraction needed in Node).
  - id: raw
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  # Conventional archives for humans downloading from the Releases page.
  - id: packaged
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers:
  - ids: [orcadub-mcp]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - ghcr.io/continuum-ai-corp/orcadub-mcp:{{ .Version }}-amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.source=https://github.com/Continuum-AI-Corp/orcadub-mcp-server
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.licenses=MIT
  - ids: [orcadub-mcp]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - ghcr.io/continuum-ai-corp/orcadub-mcp:{{ .Version }}-arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.source=https://github.com/Continuum-AI-Corp/orcadub-mcp-server
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.licenses=MIT

docker_manifests:
  - name_template: ghcr.io/continuum-ai-corp/orcadub-mcp:{{ .Version }}
    image_templates:
      - ghcr.io/continuum-ai-corp/orcadub-mcp:{{ .Version }}-amd64
      - ghcr.io/continuum-ai-corp/orcadub-mcp:{{ .Version }}-arm64
  - name_template: ghcr.io/continuum-ai-corp/orcadub-mcp:latest
    image_templates:
      - ghcr.io/continuum-ai-corp/orcadub-mcp:{{ .Version }}-amd64
      - ghcr.io/continuum-ai-corp/orcadub-mcp:{{ .Version }}-arm64

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc

release:
  github:
    owner: Continuum-AI-Corp
    name: orcadub-mcp-server
